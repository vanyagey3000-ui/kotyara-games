{% extends "base.html" %}
{% block title %}Вход | Three Cats Faceit{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-icon">F</span>
            <h1>Вход</h1>
            <p>Вернись в матчмейкинг и продолжай поднимать уровень.</p>
        </div>

        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">Ник</label>
                <input type="text" id="username" name="username" placeholder="Введите ник" required autofocus>
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" placeholder="Введите пароль" required>
            </div>

            <button type="submit" class="btn btn-primary btn-full">Войти</button>
        </form>

        <div class="auth-footer">
            Нет аккаунта? <a href="{{ url_for('register') }}">Зарегистрироваться</a>
        </div>
    </div>
</div>
{% endblock %}
