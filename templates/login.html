{% extends "base.html" %}
{% block title %}Вход — Три Кота{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-icon">🏒</span>
            <h1>Вход</h1>
            <p>С возвращением!</p>
        </div>

        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">Имя игрока</label>
                <input type="text" id="username" name="username" placeholder="Никнейм" required autofocus>
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" placeholder="Пароль" required>
            </div>

            <button type="submit" class="btn btn-primary btn-full">
                ⚡ Войти
            </button>
        </form>

        <div class="auth-footer">
            Нет аккаунта? <a href="{{ url_for('register') }}">Зарегистрироваться</a>
        </div>
    </div>
</div>
{% endblock %}
