{% extends "base.html" %}
{% block title %}Настройки | Three Cats Faceit{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card" style="max-width: 520px;">
        <div class="auth-header">
            <span class="auth-icon">S</span>
            <h1>Настройки</h1>
            <p>Управляй аккаунтом и типом соединения.</p>
        </div>

        <h3 style="margin-bottom: 12px;">Тип подключения</h3>
        <div class="connection-selector" style="margin-bottom: 28px;">
            <label class="conn-option" id="opt-p2p">
                <input type="radio" name="conn_type" value="p2p" onchange="setConnType('p2p')" id="radio-p2p">
                <div class="conn-card">
                    <strong>P2P</strong>
                    <p>Минимальная задержка и самый быстрый отклик.</p>
                </div>
            </label>
            <label class="conn-option" id="opt-ws">
                <input type="radio" name="conn_type" value="websocket" onchange="setConnType('websocket')" id="radio-ws">
                <div class="conn-card">
                    <strong>WebSocket</strong>
                    <p>Стабильный резервный режим через сервер.</p>
                </div>
            </label>
        </div>

        <h3 style="margin-bottom: 12px;">Сменить ник</h3>
        <form method="POST" class="auth-form" style="margin-bottom: 28px;">
            <input type="hidden" name="action" value="change_username">
            <div class="form-group">
                <label>Новый ник</label>
                <input type="text" name="new_username" placeholder="3-20 символов" minlength="3" maxlength="20" required value="{{ current_user.username }}">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Обновить ник</button>
        </form>

        <h3 style="margin-bottom: 12px;">Сменить пароль</h3>
        <form method="POST" class="auth-form">
            <input type="hidden" name="action" value="change_password">
            <div class="form-group">
                <label>Старый пароль</label>
                <input type="password" name="old_password" placeholder="Текущий пароль" required>
            </div>
            <div class="form-group">
                <label>Новый пароль</label>
                <input type="password" name="new_password" placeholder="Минимум 6 символов" minlength="6" required>
            </div>
            <div class="form-group">
                <label>Повтор пароля</label>
                <input type="password" name="new_password2" placeholder="Повтори новый пароль" required>
            </div>
            <button type="submit" class="btn btn-secondary btn-full">Сменить пароль</button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function setConnType(type) {
    localStorage.setItem('conn_type', type);
}

document.addEventListener('DOMContentLoaded', function() {
    var saved = localStorage.getItem('conn_type') || 'p2p';
    document.getElementById('radio-' + (saved === 'p2p' ? 'p2p' : 'ws')).checked = true;
});
</script>
{% endblock %}
